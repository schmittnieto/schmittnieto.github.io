<style>
  #scroll-top-btn {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 70;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 3rem;
    height: 3rem;
    padding: 0;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.92);
    color: #f8fafc;
    box-shadow: 0 14px 30px rgba(15, 23, 42, 0.28);
    cursor: pointer;
    opacity: 0;
    visibility: hidden;
    transform: translateY(0.35rem);
    pointer-events: none;
    transition: opacity 0.2s ease, visibility 0.2s ease, transform 0.2s ease, background 0.2s ease;
  }

  #scroll-top-btn.is-visible {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    pointer-events: auto;
  }

  #scroll-top-btn:hover,
  #scroll-top-btn:focus {
    background: rgba(30, 41, 59, 0.98);
  }

  #scroll-top-btn:focus {
    outline: 2px solid #7dd3fc;
    outline-offset: 2px;
  }

  #scroll-top-btn svg {
    width: 1.2rem;
    height: 1.2rem;
    fill: currentColor;
  }

  html.light-theme #scroll-top-btn {
    border-color: #d7dee6;
    background: rgba(255, 255, 255, 0.96);
    color: #1f2937;
    box-shadow: 0 14px 30px rgba(148, 163, 184, 0.25);
  }

  html.light-theme #scroll-top-btn:hover,
  html.light-theme #scroll-top-btn:focus {
    background: #ffffff;
  }

  @media (max-width: 540px) {
    #scroll-top-btn {
      top: 0.75rem;
      right: 0.75rem;
      width: 2.85rem;
      height: 2.85rem;
    }
  }

  @media print {
    #scroll-top-btn {
      display: none;
    }
  }
</style>

<button id="scroll-top-btn" type="button" title="Go to top" aria-label="Scroll to top">
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <path d="M12 4.5l-7 7 1.4 1.4 4.6-4.59V20h2V8.31l4.6 4.59 1.4-1.4z"/>
  </svg>
</button>

<script>
  (function () {
    function initScrollTop() {
      var scrollBtn = document.getElementById("scroll-top-btn");
      var hideTimer = null;

      if (!scrollBtn) {
        return;
      }

      function hideButton() {
        scrollBtn.classList.remove("is-visible");
      }

      function scheduleHide() {
        window.clearTimeout(hideTimer);

        if (window.scrollY > 240) {
          hideTimer = window.setTimeout(hideButton, 1000);
        }
      }

      function syncVisibility() {
        if (window.scrollY > 240) {
          scrollBtn.classList.add("is-visible");
          scheduleHide();
        } else {
          window.clearTimeout(hideTimer);
          hideButton();
        }
      }

      scrollBtn.addEventListener("click", function () {
        window.scrollTo({
          top: 0,
          behavior: "smooth"
        });
      });

      window.addEventListener("scroll", syncVisibility, { passive: true });
      window.addEventListener("resize", syncVisibility);
      syncVisibility();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initScrollTop);
    } else {
      initScrollTop();
    }
  })();
</script>
