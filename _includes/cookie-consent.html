<!-- Cookie consent is only enabled on the production host -->
<script>
  window.__cookieConsentEnabled__ = /^(www\.)?schmitt-nieto\.com$/i.test(window.location.hostname);
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }

  window.__CLARITY_ALLOWED__ = false;
  window.__clarityLoaded = false;

  function loadClarity(){
    if (!window.__cookieConsentEnabled__ || !window.__CLARITY_ALLOWED__ || window.__clarityLoaded) return;
    window.clarity = window.clarity || function(){ (window.clarity.q = window.clarity.q || []).push(arguments); };
    window.clarity('consentv2', { ad_Storage: 'granted', analytics_Storage: 'granted' });

    if (document.getElementById('clarity-loader')) {
      window.__clarityLoaded = true;
      return;
    }

    var sCl = document.createElement('script');
    sCl.id = 'clarity-loader';
    sCl.async = true;
    sCl.src = 'https://www.clarity.ms/tag/odc6tt5gf3';
    sCl.onload = function(){ window.__clarityLoaded = true; };
    document.head.appendChild(sCl);
  }

  if (window.__cookieConsentEnabled__) {
    gtag('consent', 'default', {
      ad_storage: 'denied',
      analytics_storage: 'denied',
      ad_user_data: 'denied',
      ad_personalization: 'denied'
    });
  }
</script>

<style>
  /* Existing CSS styles */
  #cookie-notice {
      font-weight: 900;
      font-size: 1rem;
      padding: 0.5rem 1rem;
      display: none;
      text-align: center;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #222;
      color: rgba(255, 255, 255, 0.8);
      z-index: 9000;
      border-top: 2px solid #00a8ff;
      box-shadow: 0px -3px 5px rgba(0, 0, 0, 0.3);
  }
  #cookie-notice a { color:#00a8ff; margin-left:1rem; font-weight:600; }
  #cookie-notice .btn {
      background-color:#00a8ff; border:none; color:#fff; padding:.5rem 1rem;
      text-transform:uppercase; cursor:pointer; margin-left:1rem; border-radius:4px;
  }
  #cookie-notice .btn:hover { background-color:#0073b1; }
  html.light-theme #cookie-notice{
      background:#ffffff;
      color:#1f2937;
      border-top:2px solid #0b63c9;
      box-shadow:0px -6px 18px rgba(148,163,184,0.25);
  }
  html.light-theme #cookie-notice a{
      color:#0b63c9;
  }
  html.light-theme #cookie-notice .btn{
      background-color:#0b63c9;
      color:#ffffff;
  }
  html.light-theme #cookie-notice .btn:hover{
      background-color:#084c99;
  }
  @media (max-width:767px){
      #cookie-notice{ padding:1rem; }
      #cookie-notice span{ display:block; margin-bottom:10px; }
      #cookie-notice .btn{ display:inline-block; margin:5px 0; }
  }
</style>

<div id="cookie-notice">
  <span>We use cookies to enhance your experience. <a href="/privacy-policy/">Privacy Policy</a></span>
  <a id="cookie-notice-accept" class="btn btn-primary btn-sm">Accept</a>
  <a id="cookie-notice-decline" class="btn btn-primary btn-sm">Decline</a>
</div>

<script>
  if (!window.__cookieConsentEnabled__) {
    var localBanner = document.getElementById('cookie-notice');
    if (localBanner) localBanner.remove();
  } else {
  var root = document.documentElement;

  function setCookieNoticeVisibility(visible){
    var banner = document.getElementById('cookie-notice');
    if (!banner) return;
    banner.style.display = visible ? 'block' : 'none';
    root.classList.toggle('cookie-banner-open', visible);
  }

  window.openCookiePreferences = function(){
    setCookieNoticeVisibility(true);
  };

  window.closeCookiePreferences = function(){
    setCookieNoticeVisibility(false);
  };

  function createCookie(name, value, days){
    var expires = "";
    if (days){
      var d = new Date();
      d.setTime(d.getTime() + (days*24*60*60*1000));
      expires = "; expires=" + d.toUTCString();
    }
    document.cookie = name + "=" + value + expires + "; path=/; SameSite=Lax";
  }
  function readCookie(name){
    var nameEQ = name + "=";
    var ca = document.cookie.split(';');
    for (var i=0; i<ca.length; i++){
      var c = ca[i];
      while (c.charAt(0) == ' ') c = c.substring(1,c.length);
      if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
    }
    return null;
  }

  function loadGA(){
    if (document.getElementById('ga4-loader')) return;
    var sGA = document.createElement('script');
    sGA.id = 'ga4-loader';
    sGA.src = 'https://www.googletagmanager.com/gtag/js?id=G-0JC8WREF2K';
    sGA.async = true;
    document.head.appendChild(sGA);
    sGA.onload = function(){
      gtag('js', new Date());
      gtag('config', 'G-0JC8WREF2K');
    };
  }

  function grantConsent(){
    gtag('consent', 'update', {
      ad_storage: 'granted',
      analytics_storage: 'granted',
      ad_user_data: 'granted',
      ad_personalization: 'granted'
    });

    // Permite cargar Clarity y lánzalo
    window.__CLARITY_ALLOWED__ = true;
    loadClarity();
  }

  function denyConsent(){
    gtag('consent', 'update', {
      ad_storage: 'denied',
      analytics_storage: 'denied',
      ad_user_data: 'denied',
      ad_personalization: 'denied'
    });

    if (window.__clarityLoaded && typeof window.clarity === 'function'){
      try { window.clarity('consentv2', { ad_Storage:'denied', analytics_Storage:'denied' }); } catch(e){}
      location.reload();
    }
    window.__CLARITY_ALLOWED__ = false;
  }

  (function initConsentUI(){
    var choice = readCookie('cookie-notice-dismissed');

    if (choice === 'true'){
      setCookieNoticeVisibility(false);
      grantConsent();
      loadGA();
    } else if (choice === 'false'){
      setCookieNoticeVisibility(true);
    } else {
      setCookieNoticeVisibility(true);
    }
  })();

  document.getElementById('cookie-notice-accept').addEventListener('click', function(){
    createCookie('cookie-notice-dismissed', 'true', 31);
    setCookieNoticeVisibility(false);
    grantConsent();
    loadGA();
  });

  document.getElementById('cookie-notice-decline').addEventListener('click', function(){
    var wasTrue = readCookie('cookie-notice-dismissed') === 'true';
    createCookie('cookie-notice-dismissed', 'false', 31);
    setCookieNoticeVisibility(false);
    if (wasTrue){
      denyConsent();
    } else {
      denyConsent();
    }
  });
  }
</script>
